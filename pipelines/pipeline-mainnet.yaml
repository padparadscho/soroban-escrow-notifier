# Pipeline Mainnet
#
# Streams SHx escrow events and transfers in real-time on Stellar Mainnet Network
#
# * Validate: goldsky turbo validate pipelines/pipeline-mainnet.yaml
# * Deploy: goldsky turbo apply pipelines/pipeline-mainnet.yaml
# * Monitor: goldsky turbo logs soroban-escrow-notifier-mainnet
# * Terminate: goldsky turbo delete soroban-escrow-notifier-mainnet

name: soroban-escrow-notifier-mainnet
resource_size: s
description: Streams SHx escrow events and transfers in real-time on Stellar Mainnet Network

sources:
  events:
    type: dataset
    dataset_name: stellar_mainnet.events
    version: 1.2.0
    start_at: latest

  transfers:
    type: dataset
    dataset_name: stellar_mainnet.transfers
    version: 1.2.0
    start_at: latest

transforms:
  filtered_events:
    type: sql
    primary_key: id
    sql: |
      SELECT
        id,
        topics,
        data,
        transaction_hash,
        ledger_sequence,
        ledger_closed_at
      FROM events
      WHERE
        contract_id = 'CCA5HAZCPEYXD7JBKAJCVUZUXAK7V5ZFU3QMJO33OJH2OHL3OGLS2P7M'
        AND type = 'contract'
        AND in_successful_contract_call = true

  filtered_transfers:
    type: sql
    primary_key: id
    sql: |
      SELECT
        id,
        transfer_type,
        sender,
        recipient,
        amount,
        transaction_hash,
        ledger_sequence,
        ledger_closed_at
      FROM transfers
      WHERE
        (asset_code = 'SHX' OR asset_issuer = 'GDSTRSHXHGJ7ZIVRBXEYE5Q74XUVCUSEKEBR7UCHEUUEK72N7I7KJ6JH')
